name: QA Test Automation

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    # Run daily at 2 AM JST
    - cron: '0 17 * * *'

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Run API unit tests
        run: |
          cd api
          npm test
          
      - name: Run client unit tests
        run: |
          cd client
          npm test
          
      - name: Upload unit test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results
          path: |
            api/coverage/
            client/coverage/

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Install Playwright browsers
        run: |
          cd client
          npx playwright install --with-deps
          
      - name: Build application
        run: |
          cd client
          npm run build:node
          
      - name: Run E2E tests
        run: |
          cd client
          npm run test:e2e
          
      - name: Upload E2E test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-test-results
          path: |
            client/playwright-report/
            client/test-results/

  cross-browser-tests:
    name: Cross-Browser Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Install Playwright browsers
        run: |
          cd client
          npx playwright install --with-deps
          
      - name: Build application
        run: |
          cd client
          npm run build:node
          
      - name: Run cross-browser tests
        run: |
          cd client
          npx playwright test --config=playwright-crossbrowser.config.ts
          
      - name: Upload cross-browser test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cross-browser-test-results
          path: |
            client/playwright-crossbrowser-report/
            client/playwright-crossbrowser-results.json

  performance-tests:
    name: Performance Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Install Playwright browsers
        run: |
          cd client
          npx playwright install --with-deps
          
      - name: Build application
        run: |
          cd client
          npm run build:node
          
      - name: Run performance tests
        run: |
          cd client
          npx playwright test like-button-performance.test.ts
          
      - name: Upload performance test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: performance-test-results
          path: |
            client/playwright-report/
            client/test-results/

  accessibility-tests:
    name: Accessibility Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Install Playwright browsers
        run: |
          cd client
          npx playwright install --with-deps
          
      - name: Build application
        run: |
          cd client
          npm run build:node
          
      - name: Run accessibility tests
        run: |
          cd client
          npx playwright test like-button-accessibility.test.ts
          
      - name: Upload accessibility test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: accessibility-test-results
          path: |
            client/playwright-report/
            client/test-results/

  security-tests:
    name: Security Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Run API security tests
        run: |
          cd api
          npm test -- likes-security.test.ts
          
      - name: Run rate limiting tests
        run: |
          cd api
          npm test -- likes-rate-limit.test.ts
          
      - name: Upload security test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-test-results
          path: |
            api/coverage/

  generate-report:
    name: Generate QA Report
    runs-on: ubuntu-latest
    needs: [unit-tests, e2e-tests, cross-browser-tests, performance-tests, accessibility-tests, security-tests]
    if: always()
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Download all test artifacts
        uses: actions/download-artifact@v4
        with:
          path: test-results/
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Generate comprehensive QA report
        run: |
          node -e "
          const fs = require('fs');
          const path = require('path');
          
          // Generate QA summary report
          const report = {
            timestamp: new Date().toISOString(),
            summary: {
              unitTests: 'Check unit-test-results/',
              e2eTests: 'Check e2e-test-results/',
              crossBrowser: 'Check cross-browser-test-results/',
              performance: 'Check performance-test-results/',
              accessibility: 'Check accessibility-test-results/',
              security: 'Check security-test-results/'
            },
            coverage: {
              description: 'QA Test Coverage based on qa-test.md',
              estimated: '75-80%',
              automated: [
                'Basic like functionality',
                'Optimistic updates',
                'Buffering and batching',
                'Network failure scenarios', 
                'Rate limiting',
                'Input validation',
                'XSS/SQL injection protection',
                'Cross-browser compatibility',
                'Responsive design',
                'Performance metrics',
                'Accessibility compliance'
              ],
              manual: [
                'Visual design verification',
                'Complex user scenarios',
                'Real device testing',
                'Exploratory testing'
              ]
            }
          };
          
          fs.writeFileSync('qa-automation-report.json', JSON.stringify(report, null, 2));
          
          // Generate markdown report
          const markdown = \`# QA Test Automation Report
          
Generated: \${report.timestamp}

## Test Coverage Summary

**Estimated automation coverage: 75-80%**

### Automated Test Categories

\${report.coverage.automated.map(item => \`- ✅ \${item}\`).join('\n')}

### Manual Testing Still Required  

\${report.coverage.manual.map(item => \`- 🔍 \${item}\`).join('\n')}

## Test Results

- **Unit Tests**: \${report.summary.unitTests}
- **E2E Tests**: \${report.summary.e2eTests}  
- **Cross-Browser**: \${report.summary.crossBrowser}
- **Performance**: \${report.summary.performance}
- **Accessibility**: \${report.summary.accessibility}
- **Security**: \${report.summary.security}

## Implementation Status

All planned QA test automation phases have been completed:

1. ✅ **Phase 1**: E2E test expansion  
2. ✅ **Phase 2**: API test enhancement
3. ✅ **Phase 3**: Cross-browser automation
4. ✅ **Phase 4**: Performance & accessibility testing
5. ✅ **Phase 5**: CI/CD integration

\`;
          
          fs.writeFileSync('QA-AUTOMATION-REPORT.md', markdown);
          console.log('QA automation report generated successfully');
          "
          
      - name: Upload QA automation report
        uses: actions/upload-artifact@v4
        with:
          name: qa-automation-report
          path: |
            qa-automation-report.json
            QA-AUTOMATION-REPORT.md
            
      - name: Comment PR with results (if PR)
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            
            if (fs.existsSync('QA-AUTOMATION-REPORT.md')) {
              const report = fs.readFileSync('QA-AUTOMATION-REPORT.md', 'utf8');
              
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `## 🧪 QA Test Automation Results\n\n${report}`
              });
            }